services:
  # PostgreSQL Database (Free tier)
  - type: postgres
    name: ecommerce-db
    plan: free
    databaseName: ecommerce_db
    user: ecommerce_user

  # PHP Web Service for Laravel API (Free tier)
  - type: web
    name: ecommerce-api-web
    env: php
    plan: free
    region: oregon

    buildCommand: >
      composer install --optimize-autoloader --no-dev &&
      php artisan migrate --force &&
      php artisan storage:link

    startCommand: >
      php artisan serve --host=0.0.0.0 --port=$PORT

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: "CHANGE_ME_APP_KEY"
      - key: APP_URL
        value: "https://ecommerce-api-web.onrender.com"

      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString

      - key: QUEUE_CONNECTION
        value: database

      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: file
      - key: LOG_CHANNEL
        value: stderr

      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: "smtp.example.com"
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: "your-smtp-username"
      - key: MAIL_PASSWORD
        value: "your-smtp-password"
      - key: MAIL_ENCRYPTION
        value: "tls"
      - key: MAIL_FROM_ADDRESS
        value: "no-reply@example.com"
      - key: MAIL_FROM_NAME
        value: "Ecommerce API"
